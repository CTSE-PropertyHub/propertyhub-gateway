name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to ACR using admin credentials
      # No az login needed — ACR has its own username/password auth
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: propertyhubacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"CTSE-PropertyHub_propertyhub-gateway" \
            /o:"ctse-propertyhub" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          dotnet build
          dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      # Build the Docker image and push it to ACR
      # Tagged with the exact git commit SHA for traceability
      - name: Build and push Docker image
        run: |
          IMAGE=propertyhubacr.azurecr.io/gateway:${{ github.sha }}
          docker build -t $IMAGE -f DockerFile .
          docker push $IMAGE
          echo "Successfully pushed: $IMAGE"