name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — check out your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — log in to Azure as your own account
      - name: Login to Azure
        run: |
          az login \
            --username "${{ secrets.AZURE_USERNAME }}" \
            --password "${{ secrets.AZURE_PASSWORD }}"
          az account set \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      # Step 3 — log in to ACR using admin credentials
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: propertyhubacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Step 4 — build and push Docker image
      - name: Build and push image
        run: |
          IMAGE=propertyhubacr.azurecr.io/gateway:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      # Step 5 — update the running Container App with the new image
      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name propertyhub-gateway \
            --resource-group propertyhub-rg \
            --image propertyhubacr.azurecr.io/gateway:${{ github.sha }}